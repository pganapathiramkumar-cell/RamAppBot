[pytest]
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
markers =
    security: marks tests as security tests (run nightly with real LLM)
    golden_path: marks tests as golden-path E2E tests (run weekly with real LLM)
    benchmark: marks performance benchmark tests
addopts = -v --tb=short
