services:
  - type: web
    name: rambot-document-service
    env: docker
    rootDir: services/document-service
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SKIP_AUTH
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MAX_FILE_SIZE_BYTES
        value: "5242880"
      - key: CORS_ALLOW_ORIGINS
        value: https://your-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHONMALLOC
        value: malloc
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: USE_REFACTORED_PIPELINE
        value: "true"
