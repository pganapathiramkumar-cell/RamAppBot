---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: steer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: steer-service
  template:
    metadata:
      labels:
        app: steer-service
    spec:
      containers:
        - name: steer-service
          image: rambot/steer-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: rambot-config
            - secretRef:
                name: rambot-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: steer-service
spec:
  selector:
    app: steer-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skill-service
  template:
    metadata:
      labels:
        app: skill-service
    spec:
      containers:
        - name: skill-service
          image: rambot/skill-service:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: rambot-config
            - secretRef:
                name: rambot-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: skill-service
spec:
  selector:
    app: skill-service
  ports:
    - port: 8002
      targetPort: 8002
