name: Keep Render Alive

on:
  schedule:
    # Ping every 10 minutes — Render free tier sleeps after 15 min
    - cron: '*/10 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://ramappbot.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
