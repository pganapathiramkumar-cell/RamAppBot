name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Document service: unit + integration tests ─────────────────────────────
  test-document-service:
    name: Test Document Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/document-service
    env:
      SUPABASE_JWT_SECRET: test_secret_for_ci_only
      LLM_PROVIDER: mock
      SKIP_AUTH: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: |
          pytest tests/unit/ \
            -v --tb=short \
            -m "not security and not golden_path"

      - name: Integration tests
        run: |
          pytest tests/integration/ \
            -v --tb=short \
            -m "not security" \
            --timeout=90

  # ── Docker build smoke test ────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build document-service image
        run: docker build services/document-service -t rambot/document-service:ci
