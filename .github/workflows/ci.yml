name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-steer-service:
    name: Test Steer Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rambot_user
          POSTGRES_PASSWORD: rambot_pass
          POSTGRES_DB: steer_db_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r services/steer-service/requirements.txt
      - run: pytest services/steer-service/tests/ -v --tb=short
        env:
          STEER_DB_URL: postgresql+asyncpg://rambot_user:rambot_pass@localhost:5432/steer_db_test

  test-skill-service:
    name: Test Skill Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r services/skill-service/requirements.txt
      - run: pytest services/skill-service/tests/ -v --tb=short

  lint-web:
    name: Lint Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint --workspace=apps/web

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [lint-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, steer-service, skill-service, auth-service, ai-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build services/${{ matrix.service }} -t rambot/${{ matrix.service }}:ci
