name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-document-service:
    name: Test Document Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r services/document-service/requirements.txt
      - run: pytest services/document-service/tests/ -v --tb=short
        env:
          SKIP_AUTH: "true"
          LLM_PROVIDER: mock

  lint-web:
    name: Lint Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx eslint apps/web/src --ext .ts,.tsx
        working-directory: ${{ github.workspace }}

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [lint-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_DOCUMENT_API_URL: https://ramappbot.onrender.com/api/v1

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build services/document-service -t rambot/document-service:ci
