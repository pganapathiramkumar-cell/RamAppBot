name: CD — Production

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push-document-service:
    name: Build & Push Document Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: services/document-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/document-service:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/document-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Render auto-deploys via autoDeploy: true in render.yaml on every push.
  # This job exists only to ensure the Docker image is published before any
  # external consumers pull it.
  notify-deploy:
    name: Deployment Tag Published
    runs-on: ubuntu-latest
    needs: [build-and-push-document-service]
    steps:
      - name: Summary
        run: |
          echo "### ✅ Document Service ${{ github.ref_name }} published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "Render will pick up the latest commit automatically." >> $GITHUB_STEP_SUMMARY
