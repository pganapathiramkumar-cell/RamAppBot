name: Document Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/document-service/**"
  pull_request:
    branches: [main]
    paths:
      - "services/document-service/**"

defaults:
  run:
    working-directory: services/document-service

jobs:
  # ── Step 1 + 3: Unit tests (file validator, document svc, JWT, AI chains) ──
  unit-tests:
    name: Unit Tests (no LLM calls)
    runs-on: ubuntu-latest
    env:
      SUPABASE_JWT_SECRET: test_secret_for_ci_only
      LLM_PROVIDER: mock
      CHROMA_PERSIST_PATH: /tmp/test_chroma

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit Tests + Coverage
        run: |
          pytest tests/unit/ \
            -v \
            -m "not security and not golden_path" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Coverage Gate (40% minimum — unit tests only, no integration)
        run: pytest tests/unit/ --cov=src --cov-fail-under=40 -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/document-service/coverage.xml
          flags: document-service-unit
        if: always()
        continue-on-error: true

  # ── Step 4: API integration tests (mocked LLM) ────────────────────────────
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SUPABASE_JWT_SECRET: test_secret_for_ci_only
      LLM_PROVIDER: mock
      CHROMA_PERSIST_PATH: /tmp/test_chroma

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Integration Tests
        run: |
          pytest tests/integration/ \
            -v \
            -m "not security" \
            --timeout=90

  # ── Nightly: Prompt injection security tests (real LLM) ───────────────────
  security-tests:
    name: Prompt Injection Security Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.2
      LLM_PROVIDER: ollama

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security Tests (local Llama)
        run: |
          pytest tests/security/ \
            -v \
            -m "security" \
            --timeout=300

# Nightly and weekly schedules are defined separately:
# nightly: 2 AM UTC  → security-tests
# weekly:  6 AM Mon  → golden-path (manual dispatch or separate workflow)
