name: Document Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/document-service/**"
  pull_request:
    branches: [main]
    paths:
      - "services/document-service/**"
  schedule:
    # Security tests run nightly at 2 AM UTC
    - cron: "0 2 * * *"

defaults:
  run:
    working-directory: services/document-service

jobs:
  # ── Unit tests (no LLM, no auth) ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests (no LLM calls)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      SUPABASE_JWT_SECRET: test_secret_for_ci_only
      LLM_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Unit Tests + Coverage
        run: |
          pytest tests/unit/ \
            -v \
            -m "not security and not golden_path" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Coverage Gate (40% minimum)
        run: pytest tests/unit/ --cov=src --cov-fail-under=40 -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: document-service-unit
        if: always()
        continue-on-error: true

  # ── API integration tests (mocked LLM, real auth) ─────────────────────────
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name != 'schedule'
    env:
      SUPABASE_JWT_SECRET: test_secret_for_ci_only
      LLM_PROVIDER: mock
      SKIP_AUTH: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Integration Tests
        run: |
          pytest tests/integration/ \
            -v \
            -m "not security" \
            --timeout=90

  # ── Nightly: Prompt injection security tests (real LLM) ───────────────────
  security-tests:
    name: Prompt Injection Security Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.2
      LLM_PROVIDER: ollama

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10
          ollama pull llama3.2

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Security Tests (local Llama)
        run: |
          pytest tests/security/ \
            -v \
            -m "security" \
            --timeout=300
